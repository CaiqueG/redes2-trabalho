<svg width="1400" height="860" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<rect width="1400" height="860" fill="white"/>

<!-- TITULO -->
<text x="420" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Laborat&#xF3;rio de Ciberseguran&#xE7;a e Privacidade</text>
<text x="420" y="58" text-anchor="middle" font-size="11" fill="#888">Acad&#xEA;mico 2 &#xB7; 2&#xBA; Andar &#xB7; 15 m &#xD7; 15 m</text>

<!-- SALA: escala 48px = 1m; abertura da porta no centro sul -->
<!-- Porta dupla corrediça: cada painel 1m (48px), abertura total 2m (96px) -->
<!-- Centro da parede sul: x=420; abertura de x=372 a x=468             -->

<!-- Piso (fill sem stroke) -->
<rect x="66" y="76" width="708" height="708" fill="#F5F5F5"/>

<!-- Paredes individuais (para criar abertura da porta) -->
<line x1="60"  y1="70"  x2="780" y2="70"  stroke="#1A1A2E" stroke-width="12" stroke-linecap="square"/>
<line x1="780" y1="70"  x2="780" y2="790" stroke="#1A1A2E" stroke-width="12" stroke-linecap="square"/>
<line x1="60"  y1="70"  x2="60"  y2="790" stroke="#1A1A2E" stroke-width="12" stroke-linecap="square"/>
<!-- Parede sul: dois segmentos com abertura no centro -->
<line x1="60"  y1="790" x2="372" y2="790" stroke="#1A1A2E" stroke-width="12" stroke-linecap="square"/>
<line x1="468" y1="790" x2="780" y2="790" stroke="#1A1A2E" stroke-width="12" stroke-linecap="square"/>

<!-- PORTA DUPLA CORREDIÇA -->
<!-- RACK 19" 24U -->
<!-- Footprint: 1m profundidade (E-W = 48px) x 0.6m largura (N-S = 29px)  -->
<!-- Encostado na parede sul (y=784), no 1/4 esquerdo (x=100 a x=148)     -->
<!-- Frente virada para o oeste: linha branca no lado esquerdo (x=100)     -->
<rect x="100" y="748" width="48" height="30" fill="#2C3E50" stroke="#1A252F" stroke-width="1.5" rx="3"/>
<!-- Frente do rack (acesso) — lado oeste -->
<line x1="100" y1="748" x2="100" y2="778" stroke="#ECF0F1" stroke-width="3.5"/>
<!-- Seta indicando frente -->
<polygon points="90,763 100,757 100,769" fill="#ECF0F1" opacity="0.7"/>

<!-- CANALETA PVC PERIMETRAL -->
<!-- Offset 20px da parede interna (aprox. 40 cm na vida real) -->
<rect x="82" y="92" width="676" height="676" fill="none" stroke="#E53935" stroke-width="2.5" stroke-dasharray="14,8"/>

<!-- Guia da porta (trilho) — linha fina no chão entre os painéis -->
<line x1="322" y1="790" x2="518" y2="790" stroke="#AAA" stroke-width="1"/>

<!-- Painel esquerdo: deslizado para a esquerda (posição aberta) -->
<rect x="322" y="784" width="50" height="12" fill="white" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3"/>
<!-- Painel direito: deslizado para a direita (posição aberta) -->
<rect x="468" y="784" width="50" height="12" fill="white" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3"/>

<!-- Setas indicando direção de deslizamento -->
<line x1="370" y1="808" x2="348" y2="808" stroke="#777" stroke-width="1.5"/>
<polygon points="348,804 340,808 348,812" fill="#777"/>
<line x1="470" y1="808" x2="492" y2="808" stroke="#777" stroke-width="1.5"/>
<polygon points="492,804 500,808 492,812" fill="#777"/>

<!-- Label da porta -->
<text x="420" y="826" text-anchor="middle" font-size="10" fill="#777">Porta dupla corredi&#xE7;a (2 &#xD7; 1 m)</text>

<!-- COTAS HORIZONTAIS (topo) -->
<line x1="60"  y1="50" x2="780" y2="50" stroke="#444" stroke-width="1"/>
<line x1="60"  y1="46" x2="60"  y2="54" stroke="#444" stroke-width="1.5"/>
<line x1="780" y1="46" x2="780" y2="54" stroke="#444" stroke-width="1.5"/>
<text x="420" y="47" text-anchor="middle" font-size="11" fill="#444" font-style="italic">15 m</text>

<!-- COTAS VERTICAIS (lateral esquerda) -->
<line x1="40" y1="70"  x2="40" y2="790" stroke="#444" stroke-width="1"/>
<line x1="36" y1="70"  x2="44" y2="70"  stroke="#444" stroke-width="1.5"/>
<line x1="36" y1="790" x2="44" y2="790" stroke="#444" stroke-width="1.5"/>
<text x="28" y="434" text-anchor="middle" font-size="11" fill="#444" font-style="italic" transform="rotate(-90,28,434)">15 m</text>

<!-- DIVISOR: area da sala | area da legenda -->
<line x1="840" y1="10" x2="840" y2="850" stroke="#DDD" stroke-width="1.5" stroke-dasharray="6,4"/>

<!-- ============================================ -->
<!-- LEGENDA                                      -->
<!-- ============================================ -->
<!-- Caixa da legenda -->
<rect x="860" y="70" width="510" height="720" fill="#F9F9F9" stroke="#CCC" stroke-width="1.2" rx="6"/>
<!-- Cabeçalho -->
<rect x="860" y="70" width="510" height="36" fill="#1A237E" rx="6"/>
<rect x="860" y="88" width="510" height="18" fill="#1A237E"/>
<text x="1115" y="94" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Legenda</text>

<!-- ENTRADA 0: Rack 19" 24U -->
<rect x="880" y="112" width="24" height="38" fill="#2C3E50" stroke="#1A252F" stroke-width="1.5" rx="2"/>
<line x1="880" y1="112" x2="880" y2="150" stroke="#ECF0F1" stroke-width="3"/>
<text x="916" y="124" font-size="12" fill="#1A1A1A" font-weight="bold">Rack 19&#x22; 24U</text>
<text x="916" y="139" font-size="10" fill="#666">Linha grossa = frente (acesso) &#xB7; encostado na parede</text>

<!-- ENTRADA 1: Canaleta PVC perimetral -->
<line x1="880" y1="133" x2="940" y2="133" stroke="#E53935" stroke-width="2.5" stroke-dasharray="10,6"/>
<text x="952" y="129" font-size="12" fill="#1A1A1A" font-weight="bold">Canaleta PVC perimetral</text>
<text x="952" y="145" font-size="10" fill="#666">Eletrocalha/canaleta ao longo das paredes &#xB7; Cat6A U/FTP</text>

</svg>
